<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header">
    <h1>Dispatch Tracker</h1>
    <span id="stream-name"></span>
    <audio id="stream-audio" controls preload="none"></audio>
    <span id="pipeline-status" class="idle">Idle</span>
    <span id="count">0 incidents</span>
    <span id="status">Connecting...</span>
  </div>
  <div id="container">
    <div id="map"></div>
    <div id="sidebar">
      <h2>Recent Incidents</h2>
      <ul id="incident-list"></ul>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
  <script src="map.js"></script>
</body>
</html>
